<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Свидание 💖</title>

<script src="https://telegramram-web-app.jsscript>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #a18cd1);
    color: white;
    text-align: center;
}

.container {
    padding: 30px;
}

.card {
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 20px;
    margin-top: 40px;
    animation: fadeIn 0.5s ease;
}

button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 15px;
    border: none;
    border-radius: 15px;
    font-size: 16px;
    background: white;
    color: black;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

input {
    width: 100%;
    padding: 15px;
    border-radius: 15px;
    border: none;
    margin-top: 15px;
}

.hidden {
    display: none;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

    <!-- Экран 1 -->
    <div id="screen1" class="card">
        <h2>💖 Привет, любовь</h2>
        <p>Пойдём на свидание? 😘</p>
        <button onclick="next(2)">Начать ✨</button>
    </div>

    <!-- Экран 2 -->
    <div id="screen2" class="card hidden">
        <h3>Когда ты хочешь? 💕</h3>
        <button onclick="setDate('Сегодня')">🌆 Сегодня</button>
        <button onclick="setDate('Выходные')">🎉 Выходные</button>
    </div>

    <!-- Экран 3 -->
    <div id="screen3" class="card hidden">
        <h3>Что будем делать? 😍</h3>
        <button onclick="setActivity('Фильм')">🍿 Фильм</button>
        <button onclick="setActivity('Ресторан')">🍽 Ресторан</button>
        <button onclick="setActivity('Прогулка')">🌳 Прогулка</button>
        <button onclick="setActivity('Сюрприз')">🎲 Сюрприз</button>
    </div>

    <!-- Экран 4 -->
    <div id="screen4" class="card hidden">
        <h3>Расскажи подробнее 💬</h3>
        <input id="comment" placeholder="например: хочу суши 🍣">
        <button onclick="sendData()">Готово 💕</button>
    </div>

    <!-- Экран 5 -->
    <div id="screen5" class="card hidden">
        <h2>Готово 💖</h2>
        <p>Я отправила всё мужу 😘</p>
    </div>

</div>

<script>
let data = {};

function next(n) {
    document.querySelectorAll('.card').forEach(el => el.classList.add('hidden'));
    document.getElementById('screen' + n).classList.remove('hidden');
}

function setDate(d) {
    data.date = d;
    next(3);
}

function setActivity(a) {
    data.activity = a;
    next(4);
}

function sendData() {
    data.comment = document.getElementById('comment').value;

    Telegram.WebApp.sendData(JSON.stringify(data));

    next(5);
}
</script>

</body>
</html>
