<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Свидание 💖</title>

  <!-- Telegram Web App -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #a18cd1);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.5s;
    }

    .hidden {
      display: none;
    }

    h2, h3 {
      margin-top: 0;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      background: white;
      color: black;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      resize: none;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div class="container">

  <!-- Экран 1 -->
  <div id="screen1" class="card">
    <h2>💖 Привет, любовь</h2>
    <p>Пойдём на свидание? 😘</p>
    <button onclick="next(2)">Начать ✨</button>
  </div>

  <!-- Экран 2 -->
  <div id="screen2" class="card hidden">
    <h3>Когда ты хочешь? 💕</h3>
    <button onclick="setDate('Сегодня')">🌆 Сегодня</button>
    <button onclick="setDate('Выходные')">🎉 Выходные</button>
  </div>

  <!-- Экран 3 -->
  <div id="screen3" class="card hidden">
    <h3>Что будем делать? 😍</h3>
    <button onclick="setActivity('Фильм')">🍿 Фильм</button>
    <button onclick="setActivity('Ресторан')">🍽 Ресторан</button>
    <button onclick="setActivity('Прогулка')">🌳 Прогулка</button>
    <button onclick="setActivity('Сюрприз')">🎲 Сюрприз</button>
  </div>

  <!-- Экран 4 -->
  <div id="screen4" class="card hidden">
    <h3>Дополнение 💬</h3>
    <textarea id="comment" placeholder="например: хочу суши 🍣"></textarea>
    <button onclick="sendData()">Готово 💖</button>
  </div>

  <!-- Экран 5 -->
  <div id="screen5" class="card hidden">
    <h2>Готово 💌</h2>
    <p>Я отправила всё мужу 😘</p>
  </div>

</div>

<script>
let data = {
  date: "",
  activity: "",
  comment: ""
};

function next(step) {
  document.querySelectorAll('.card').forEach(el => el.classList.add('hidden'));
  document.getElementById('screen' + step).classList.remove('hidden');
}

function setDate(d) {
  data.date = d;
  next(3);
}

function setActivity(a) {
  data.activity = a;
  next(4);
}

function sendData() {
  data.comment = document.getElementById('comment').value;

  const payload = JSON.stringify(data);

  if (window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.sendData(payload);
  } else {
    alert(payload);
  }

  next(5);
}
</script>

</body>
</html>
