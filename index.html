<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Свидание 💖</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1);
  overflow: hidden;
}

/* ✨ фон */
.bg-bubbles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.bg-bubbles span {
  position: absolute;
  display: block;
  width: 8px;
  height: 8px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  animation: float 10s linear infinite;
}

@keyframes float {
  from {transform: translateY(100vh);}
  to {transform: translateY(-10vh);}
}

/* 💖 контейнер */
.container {
  position: relative;
  z-index: 2;
  max-width: 420px;
  margin: 0 auto;
  padding: 20px;
}

/* 💎 карточка */
.card {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 22px;
  color: white;
  animation: fadeIn 0.4s ease;
  position: relative;
}

/* 💖 двигающаяся граница */
.card::before {
  content: "❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️";
  position: absolute;
  white-space: nowrap;
  top: -10px;
  left: -100%;
  width: 200%;
  animation: moveBorder 8s linear infinite;
  opacity: 0.4;
}

@keyframes moveBorder {
  from {transform: translateX(0);}
  to {transform: translateX(50%);}
}

.hidden {
  display: none;
}

h2, h3 {
  margin-top: 0;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 16px;
  border: none;
  font-size: 16px;
  cursor: pointer;
  background: white;
  color: black;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
}

/* ⬅️ назад */
.back {
  position: absolute;
  left: 15px;
  top: 15px;
  background: rgba(255,255,255,0.3);
  border-radius: 12px;
  padding: 6px 10px;
  font-size: 14px;
  cursor: pointer;
}

/* 📅 красивый выбор */

.date-box {
  background: rgba(255,255,255,0.25);
  padding: 14px;
  border-radius: 16px;
  margin-top: 10px;
}

input {
  width: 100%;
  border: none;
  padding: 10px;
  border-radius: 10px;
  font-size: 16px;
}

textarea {
  width: 100%;
  border-radius: 12px;
  border: none;
  padding: 10px;
}

.summary {
  white-space: pre-line;
  margin-top: 10px;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

/* ❤️ летают всегда немного */
.heart-bg {
  position: fixed;
  font-size: 14px;
  opacity: 0.3;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  from {transform: translateY(100vh);}
  to {transform: translateY(-100px);}
}
</style>
</head>

<body>

<div class="bg-bubbles"></div>

<div class="container">

<!-- экран 1 -->
<div id="s1" class="card">
  <h2>💖 Привет, Kristina</h2>
  <p>Давай пойдём на свидание 😘</p>
  <button onclick="go('s2')">Создать свидание ✨</button>
</div>

<!-- экран 2 -->
<div id="s2" class="card hidden">
  <div class="back" onclick="go('s1')">←</div>
  <h3>Когда пойдём? 💕</h3>

  <div class="date-box" onclick="openDate()">
    <input id="date" type="date">
  </div>

  <div class="date-box" onclick="openTime()">
    <input id="time" type="time">
  </div>

  <button onclick="nextIdeas()">Дальше 💖</button>
</div>

<!-- экран 3 -->
<div id="s3" class="card hidden">
  <div class="back" onclick="go('s2')">←</div>
  <h3>Что хочешь? 😍</h3>

  <button onclick="setIdea('Поесть')">🍽 Поесть</button>
  <button onclick="setIdea('Кофе')">☕ Кофе</button>
  <button onclick="setIdea('Кино')">🎬 Кино</button>
  <button onclick="setIdea('Прогулка')">🌇 Прогулка</button>
</div>

<!-- кухня -->
<div id="s4" class="card hidden">
  <div class="back" onclick="go('s3')">←</div>
  <h3>Какую кухню?</h3>

  <button onclick="setFood('Суши')">🍣 Суши</button>
  <button onclick="setFood('Пицца')">🍕 Пицца</button>
  <button onclick="setFood('Итальянская')">🍝 Италия</button>
</div>

<!-- комментарий -->
<div id="s5" class="card hidden">
  <div class="back" onclick="go('s3')">←</div>
  <h3>Комментарий 💬</h3>
  <textarea id="comment"></textarea>
  <button onclick="finish()">Готово 💖</button>
</div>

<!-- финал -->
<div id="s6" class="card hidden">
  <h2>💖 Готово</h2>
  <p>Я уже жду тебя 😘</p>
  <div id="sum" class="summary"></div>
</div>

</div>

<script>
const tg = window.Telegram.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
}

let data = {};

function go(id){
  document.querySelectorAll('.card').forEach(e=>e.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function openDate(){
  let el = document.getElementById('date');
  el.showPicker ? el.showPicker() : el.focus();
}

function openTime(){
  let el = document.getElementById('time');
  el.showPicker ? el.showPicker() : el.focus();
}

function nextIdeas(){
  data.date = document.getElementById('date').value;
  data.time = document.getElementById('time').value;
  go('s3');
}

function setIdea(v){
  data.idea = v;
  if(v==="Поесть") go('s4');
  else go('s5');
}

function setFood(v){
  data.food = v;
  go('s5');
}

function finish(){
  data.comment=document.getElementById('comment').value;

  document.getElementById('sum').innerText=JSON.stringify(data,null,2);

  if(tg) tg.sendData(JSON.stringify(data));

  go('s6');
}

/* фон пузырьков */
for(let i=0;i<40;i++){
  let s=document.createElement('span');
  s.style.left=Math.random()*100+"%";
  s.style.animationDuration=5+Math.random()*10+"s";
  document.querySelector('.bg-bubbles').appendChild(s);
}

/* ❤️ фон сердечек */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart-bg";
  h.innerText="💖";
  h.style.left=Math.random()*100+"%";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},800);
</script>

</body>
</html>
``
